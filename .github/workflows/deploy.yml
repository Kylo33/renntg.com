name: Deploy to AWS

on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v6
      with:
        version: 10
    - run: pnpm install
    - run: pnpm run build
    - uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::099660946013:role/renntg.com-github-action
    - uses: hashicorp/setup-terraform@v4 
      with:
        terraform_wrapper: true
    - run: terraform -chdir=infra init
    - run: terraform -chdir=infra apply -auto-approve
    - run: echo WEBSITE_BUCKET_NAME=$(terraform output website_bucket_name) >> $GITHUB_ENV
    - run: echo WEBSITE_BUCKET_REGION=$(terraform output website_bucket_region) >> $GITHUB_ENV
    - uses: actions/download-artifact@v4
      with:
        name: build-output
        path: dist/

    - run: echo ${{ env.WEBSITE_BUCKET_NAME }}
    - run: echo ${{ env.WEBSITE_BUCKET_REGION }}
